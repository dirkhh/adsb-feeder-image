name: Python Lint

on:
  push:
    branches: ["**"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/python-lint.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/python-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy flake8 black pylint
        # Install project dependencies for type checking
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run flake8
      id: flake8
      continue-on-error: true
      run: |
        flake8 src/modules/adsb-feeder/filesystem/root/opt/adsb/adsb-setup --max-line-length=130 --show-source --statistics

    - name: Run mypy
      id: mypy
      if: always()
      continue-on-error: true
      run: |
        mypy src/modules/adsb-feeder/filesystem/root/opt/adsb/adsb-setup --config-file=pyproject.toml --pretty

    - name: Check code formatting with black
      id: black
      if: always()
      continue-on-error: true
      run: |
        black --check --line-length=130 src/modules/adsb-feeder/filesystem/root/opt/adsb/adsb-setup

    - name: Report status
      if: always()
      run: |
        echo "Linting complete. Checking results..."
        if [ "${{ steps.flake8.outcome }}" != "success" ] || [ "${{ steps.mypy.outcome }}" != "success" ] || [ "${{ steps.black.outcome }}" != "success" ]; then
          echo "❌ One or more linters found errors. Check the logs above."
          exit 1
        fi
        echo "✅ All linters passed successfully!"

